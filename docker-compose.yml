services:
  postgres:
    image: postgres:16
    container_name: telegram-miniapp-shop-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - telegram-miniapp-shop-data:/var/lib/postgresql/data

volumes:
  telegram-miniapp-shop-data: