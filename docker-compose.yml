services:
  postgres:
    image: postgres:16
    container_name: telegram-miniapp-shop-db
    environment:
      POSTGRES_DB: telegram_miniapp_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - telegram-miniapp-shop-data:/var/lib/postgresql/data

volumes:
  telegram-miniapp-shop-data: